<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Campus Safety{% endblock %}</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/styles.css') }}" rel="stylesheet">

  {% block head_extra %}{% endblock %}
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark" style="background: var(--campus-primary);">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('index') }}">
        <i class="bi bi-shield-lock-fill me-2"></i>Smart Campus Safety
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="nav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('index') }}"><i class="bi bi-camera-video me-1"></i>Live</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('dashboard') }}"><i class="bi bi-graph-up-arrow me-1"></i>Dashboard</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{{ url_for('incidents') }}"><i class="bi bi-journal-text me-1"></i>Incidents</a>
          </li>
        </ul>
        <span class="navbar-text small text-white-50">
          <i class="bi bi-geo-alt me-1"></i>{{ location_name }}
        </span>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    // Global Smart Alert System
    const AlertSystem = {
        audioCtx: null,
        
        init() {
            if (Notification.permission !== "granted") {
                Notification.requestPermission();
            }
            this.startPolling();
        },

        playSiren() {
            if (!this.audioCtx) this.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = this.audioCtx.createOscillator();
            const gain = this.audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(440, this.audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(880, this.audioCtx.currentTime + 0.5);
            osc.frequency.exponentialRampToValueAtTime(440, this.audioCtx.currentTime + 1.0);
            
            gain.gain.setValueAtTime(0.1, this.audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, this.audioCtx.currentTime + 1.0);
            
            osc.connect(gain);
            gain.connect(this.audioCtx.destination);
            
            osc.start();
            osc.stop(this.audioCtx.currentTime + 1.0);
        },

        showNotification(alert) {
            this.playSiren();
            if (Notification.permission === "granted") {
                new Notification(`⚠️ ${alert.level}: ${alert.event_type}`, {
                    body: alert.details
                });
            }
        },

        startPolling() {
            setInterval(() => {
                fetch("/get_latest_alert")
                    .then(r => r.json())
                    .then(data => {
                        if (data.level) {
                            this.showNotification(data);
                        }
                    });
            }, 3000);
        }
    };

    // Initialize on load
    document.addEventListener('DOMContentLoaded', () => AlertSystem.init());
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
